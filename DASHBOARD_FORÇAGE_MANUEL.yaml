## ✨ AMÉLIORATIONS POSSIBLES

1. **Ajouter un timer visuel** qui compte les secondes
2. **Ajouter un toggle switch** au lieu de boutons
3. **Ajouter des automations** qui appelent le service
4. **Ajouter des graphiques** ApexCharts
5. **Ajouter des notifications** via Telegram/Email

---

## 🚀 INSTALLATION

1. Aller à **Paramètres → Tableaux de Bord**
2. **Créer un nouveau tableau** ou **Éditer existant**
3. **Clic code** (mode texte)
4. **Copier le code YAML ci-dessus**
5. **Sauvegarder**
6. **Rafraîchir** la page

---

