title: Optimisation Cumulus Solaire (Custom)
views:
  - title: Principal
    cards:
      - type: custom:mushroom-title-card
        title: 🌞 Cumulus Solaire - Tableau de Bord

      - type: custom:mushroom-entity-card
        entity: switch.cumulus_control
        name: État du Cumulus
        icon: mdi:water-boiler
        layout: vertical
        tap_action:
          action: toggle
        show_entity_picture: false

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.cumulus_status
            primary: "{{ state }}"
            secondary: Raison d'activation
            icon: |
              {% if is_state('switch.cumulus_control', 'on') %}
                mdi:solar-power
              {% else %}
                mdi:pause
              {% endif %}

          - type: custom:mushroom-template-card
            entity: sensor.cumulus_solar_power
            primary: "{{ states('sensor.cumulus_solar_power') | int }}W"
            secondary: Puissance Solaire
            icon: mdi:solar-power-box

      - type: custom:mini-graph-card
        entities:
          - sensor.cumulus_solar_power
        name: Puissance Solaire (24h)
        hours_to_show: 24
        line_color: '#FFB81C'
        font_size: 90

      - type: grid
        columns: 2
        cards:
          - type: custom:mushroom-number-card
            entity: sensor.cumulus_daily_solar_activations
            name: Activations Solaire (J)
            icon: mdi:counter

          - type: custom:mushroom-number-card
            entity: sensor.cumulus_daily_hc_activations
            name: Activations HC (J)
            icon: mdi:counter

  - title: Contrôle
    cards:
      - type: custom:mushroom-template-card
        entity: switch.cumulus_control
        primary: >
          {% if is_state('switch.cumulus_control', 'on') %}
            CUMULUS EN MARCHE
          {% else %}
            CUMULUS ARRÊTÉ
          {% endif %}
        secondary: >
          {{ states('sensor.cumulus_solar_power') }}W | {{ states('sensor.cumulus_status') }}
        icon: |
          {% if is_state('switch.cumulus_control', 'on') %}
            mdi:water-boiler
          {% else %}
            mdi:water-boiler-off
          {% endif %}
        tap_action:
          action: toggle

      - type: horizontal-stack
        cards:
          - type: button
            entity: switch.cumulus_control
            name: Activer
            tap_action:
              action: call-service
              service: switch.turn_on
              data:
                entity_id: switch.cumulus_control

          - type: button
            entity: switch.cumulus_control
            name: Désactiver
            tap_action:
              action: call-service
              service: switch.turn_off
              data:
                entity_id: switch.cumulus_control

  - title: Historique
    cards:
      - type: history-graph
        title: Historique du Cumulus (24h)
        entities:
          - switch.cumulus_control
        hours_to_show: 24

mode: storage
