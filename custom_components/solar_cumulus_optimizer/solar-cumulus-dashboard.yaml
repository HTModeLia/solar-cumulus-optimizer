# Si Home Assistant affiche "entity not found", remplacez les IDs ci-dessous
# par les IDs exacts visibles dans Settings > Devices & Services > Entities.
title: Optimisation Cumulus Solaire
views:
  - title: Principal
    cards:
      - type: markdown
        content: |
          # 🌞 Cumulus Solaire
          Tableau de bord principal

      - type: entities
        title: État du Cumulus
        entities:
          - entity: switch.cumulus_control
            name: État du Cumulus
          - entity: sensor.cumulus_status
            name: Statut
          - entity: sensor.cumulus_solar_power
            name: Puissance solaire
          - entity: sensor.cumulus_cloud_detection
            name: État du ciel

      - type: history-graph
        title: Puissance solaire (24h)
        entities:
          - sensor.cumulus_solar_power
        hours_to_show: 24

      - type: grid
        columns: 2
        cards:
          - type: entities
            title: Statistiques solaires
            entities:
              - entity: sensor.cumulus_daily_solar_activations
                name: Activations
              - entity: sensor.cumulus_daily_solar_runtime
                name: Temps cumulé

          - type: entities
            title: Statistiques HC
            entities:
              - entity: sensor.cumulus_daily_hc_activations
                name: Activations
              - entity: sensor.cumulus_daily_hc_runtime
                name: Temps cumulé

  - title: Contrôle
    cards:
      - type: entities
        title: Contrôle rapide
        entities:
          - entity: switch.cumulus_control
            name: Cumulus
          - entity: sensor.cumulus_status
            name: Statut
          - entity: sensor.cumulus_last_duration
            name: Dernière durée
          - entity: sensor.cumulus_solar_power
            name: Puissance solaire

      - type: horizontal-stack
        cards:
          - type: button
            entity: switch.cumulus_control
            name: Activer
            tap_action:
              action: call-service
              service: switch.turn_on
              data:
                entity_id: switch.cumulus_control

          - type: button
            entity: switch.cumulus_control
            name: Désactiver
            tap_action:
              action: call-service
              service: switch.turn_off
              data:
                entity_id: switch.cumulus_control

  - title: Historique
    cards:
      - type: history-graph
        title: Historique du Cumulus (24h)
        entities:
          - switch.cumulus_control
        hours_to_show: 24

mode: storage
